<div class="container">

    <form [formGroup]="productForm" (ngSubmit)="addProduct()">

        <div class="file-upload-container">
            <label class="file-upload-label">
                <span>Select an image file</span>
                <input type="file" id="fileInput" (change)="onFileSelected($event)" hidden>
                <mat-icon>attach_file</mat-icon>
            </label>

            <div *ngIf="selectedFile" class="image-preview">
                <div class="circle-image">
                    <img [src]="imagePreview" alt="Selected image" class="preview-image">
                </div>
            </div>
        </div>

        <mat-form-field appearance="outline" class="form-field">
            <mat-label>Select a Category</mat-label>
            <mat-select formControlName="categoryId" name="categoryId">
                <mat-option *ngFor="let category of categoryList" [value]="category.id">
                    {{category.name}}
                </mat-option>
            </mat-select>
            <mat-error *ngIf="productForm.get('categoryId')?.hasError('required')">Please select a category</mat-error>
        </mat-form-field>

        <mat-form-field  appearance="outline" class="form-field">
            <mat-label>Name</mat-label>
            <input matInput type="text" placeholder="Name" formControlName="name"/>
            <mat-error *ngIf="productForm.get('name')?.hasError('required')">Please enter a name</mat-error>
        </mat-form-field>

        <mat-form-field  appearance="outline" class="form-field">
            <mat-label>Manufacturer</mat-label>
            <input matInput type="text" placeholder="Manufacturer" formControlName="manufacturer"/>
            <mat-error *ngIf="productForm.get('manufacturer')?.hasError('required')">Please enter a manufacturer</mat-error>
        </mat-form-field>

        <mat-form-field  appearance="outline" class="form-field">
            <mat-label>Price</mat-label>
            <input matInput type="number" placeholder="Price" formControlName="price"/>
            <mat-error *ngIf="productForm.get('price')?.hasError('required')">Please enter the RRP</mat-error>
        </mat-form-field>

        <mat-form-field  appearance="outline" class="form-field">
            <mat-label>Stock Quantity</mat-label>
            <input matInput type="number" placeholder="Stock Quantity" formControlName="stockQuantity"/>
            <mat-error *ngIf="productForm.get('stockQuantity')?.hasError('required')">Please enter the stock quantity</mat-error>
        </mat-form-field>

        <mat-form-field  appearance="outline" class="form-field">
            <mat-label>Description</mat-label>
            <textarea matInput placeholder="Description" formControlName="description"></textarea>
            <mat-error *ngIf="productForm.get('description')?.hasError('required')">Please enter a description</mat-error>
        </mat-form-field>
        
        <button mat-raised-button color="primary" type="submit">Add Product</button>

    </form>

</div>
