<div class="container">
    <h2>Add Voucher</h2>

    <form [formGroup]="voucherForm" (ngSubmit)="addVoucher()">
        <mat-form-field appearance="outline" class="form-field">
            <mat-label>Name</mat-label>
            <input matInput type="text" placeholder="Name" formControlName="name"/>
            <mat-error *ngIf="voucherForm.get('name')?.hasError('required')">Please enter a name for the voucher.</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="form-field">
            <mat-label>Code</mat-label>
            <input matInput type="text" placeholder="Code" formControlName="code"/>
            <mat-error *ngIf="voucherForm.get('code')?.hasError('required')">Please enter a code for the voucher.</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="form-field">
            <mat-label>Discount</mat-label>
            <input matInput type="text" placeholder="Discount" formControlName="discount"/>
            <mat-error *ngIf="voucherForm.get('discount')?.hasError('required')">Please enter a value for the discount provided by the voucher.</mat-error>
        </mat-form-field>

        <button mat-raised-button color="primary" type="submit">Add Voucher</button>

    </form>
</div>
