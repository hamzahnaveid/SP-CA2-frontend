<div class="container">
    <mat-card>
        <mat-card-content>
            <table mat-table [dataSource]="customers" class="mat-elevation-z8">

                <ng-container matColumnDef="email">
                    <th mat-header-cell *matHeaderCellDef>Email</th>
                    <td mat-cell *matCellDef="let customer">{{ customer.email}}</td>
                </ng-container>

                <ng-container matColumnDef="userName">
                    <th mat-header-cell *matHeaderCellDef>Customer Name</th>
                    <td mat-cell *matCellDef="let customer">{{ customer.name }}</td>
                </ng-container>

                <ng-container matColumnDef="address">
                    <th mat-header-cell *matHeaderCellDef>Shipping Address</th>
                    <td mat-cell *matCellDef="let customer">{{ customer.address }}</td>
                </ng-container>

                <ng-container matColumnDef="action">
                    <th mat-header-cell *matHeaderCellDef>Orders</th>
                    <td mat-cell *matCellDef="let customer">
                        <button mat-raised-button color="primary" (click)="viewOrders(customer.email)">View Orders</button>
                    </td>
                </ng-container>

                <tr mat-header-row *matHeaderRowDef="['email', 'userName', 'address', 'action']"></tr>

                <tr mat-row *matRowDef="let row; columns: ['email', 'userName', 'address', 'action']"></tr>

            </table>
        </mat-card-content>
    </mat-card>
</div>
