<mat-dialog-content>
    <div class="container">
        <mat-card>
            <mat-card-content>
                <table mat-table [dataSource]="orders" class="mat-elevation-z8">

                    <ng-container matColumnDef="trackingId">
                        <th mat-header-cell *matHeaderCellDef>Tracking ID</th>
                        <td mat-cell *matCellDef="let order">{{ order.trackingId }}</td>
                    </ng-container>

                    <ng-container matColumnDef="amount">
                        <th mat-header-cell *matHeaderCellDef>Amount</th>
                        <td mat-cell *matCellDef="let order">€{{ order.amount }}</td>
                    </ng-container>

                    <ng-container matColumnDef="address">
                        <th mat-header-cell *matHeaderCellDef>Address</th>
                        <td mat-cell *matCellDef="let order">{{ order.address }}</td>
                    </ng-container>

                    <ng-container matColumnDef="date">
                        <th mat-header-cell *matHeaderCellDef>Date</th>
                        <td mat-cell *matCellDef="let order">{{ order.date | date: 'dd/MM/yyyy' }}</td>
                    </ng-container>

                    <ng-container matColumnDef="status">
                        <th mat-header-cell *matHeaderCellDef>Status</th>
                        <td mat-cell *matCellDef="let order">{{ order.orderStatus }}</td>
                    </ng-container>

                    <ng-container matColumnDef="action">
                        <th mat-header-cell *matHeaderCellDef>Action</th>
                        <td mat-cell *matCellDef="let order">
                            <button mat-raised-button color="primary" (click)="viewItems(order.id)">View items</button>
                        </td>
                    </ng-container>

                    <tr mat-header-row *matHeaderRowDef="['trackingId', 'amount', 'address', 'date', 'status', 'action']"></tr>

                    <tr mat-row *matRowDef="let row; columns: ['trackingId', 'amount', 'address', 'date', 'status', 'action']"></tr>

                </table>
            </mat-card-content>
        </mat-card>

        <div class="button-row">
            <button mat-raised-button color="warn" (click)="closeForm()" class="close-button">Close</button>
        </div>
    </div>
</mat-dialog-content>
